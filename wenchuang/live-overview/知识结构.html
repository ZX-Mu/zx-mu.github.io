# 文创产业的创业新思路
## 一、文创产业的重新定义
### 1.1 文创的两大分类
#### 文化文创：文化产品输出（冰箱贴、T恤、景区纪念品）
#### 产业文创：文化与产业深度融合，创造新模式
### 1.2 文物活化工程的真正意义
#### 不是简单复制文物做成缩小版
#### 是将历史时代精神活化到今天产业中
#### 用符号和logo带动产业发展
## 二、文创创业的核心思维体系
### 2.1 道法术器势框架
#### 道：方向指引（做什么、创造什么）
#### 法：方法论和思维模式
#### 术：各行业的具体应用
#### 器：AI等工具的运用
#### 势：把握时代趋势
### 2.2 双引擎驱动模式
#### 互联网+：短视频、抖音快手、流量传播
#### 文化+：各行各业融入文化元素
### 2.3 技术营销学派视角
#### 技术可以传播（二维码等）
#### 技术可以创造（AI创作）
#### 破坏性增长理念
## 三、国家政策与文化自信
### 3.1 文化自信三大核心
#### 优秀中国传统文化
#### 红色文化
#### 社会主义先进文化
### 3.2 相关国家工程
#### 制造业强国上攻行动
#### 文化强国2035目标
#### 文化自信六进工程（进学校、机关、社区、网络等）
#### 文化自信宣导师培训体系
### 3.3 文旅+政策
#### 农文旅商深度融合
#### 文旅赛道成为最火赛道

### 4.1 课程总体目标

#### 从县城/城市/家乡挖掘文化IP

## 五、市场现象与案例分析
